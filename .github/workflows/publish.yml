name: Publish NuGet Package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish:
        description: Publish package to NuGet
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  build-native:
    name: Build (${{ matrix.rid }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            rid: win
          - runner: ubuntu-latest
            rid: linux-x64
          - runner: ubuntu-24.04-arm
            rid: linux-arm64
          - runner: macos-latest
            rid: osx

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: >-
            ${{ matrix.runner == 'windows-latest' && 'x86_64-pc-windows-msvc,aarch64-pc-windows-msvc' || 
                matrix.runner == 'macos-latest' && 'x86_64-apple-darwin,aarch64-apple-darwin' || '' }}

      - name: Install .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Build
        run: dotnet build dotnet/Vortex.Sspi/Vortex.Sspi.csproj -c Release

      - name: Upload native artifacts
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.rid }}
          path: target/ # Captures the target/<triple>/release structure
          if-no-files-found: error

  pack:
    name: Pack NuGet
    runs-on: ubuntu-latest
    needs: build-native
    steps:
      - uses: actions/checkout@v6

      - name: Install .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Download all native artifacts
        uses: actions/download-artifact@v4
        with:
          path: target
          pattern: native-*
          merge-multiple: true # Reconstructs the target directory tree

      - name: Pack
        # Set BuildRust=false so it doesn't try to run cargo on the packing runner
        run: dotnet pack dotnet/Vortex.Sspi/Vortex.Sspi.csproj -c Release -o nupkg /p:BuildRust=false

      - name: Upload NuGet package
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: nupkg/*.nupkg

  publish:
    name: Publish NuGet
    runs-on: ubuntu-latest
    needs: pack
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.publish == true)
    permissions:
      id-token: write
    steps:
      - name: Download NuGet package
        uses: actions/download-artifact@v4
        with:
          name: nupkg
          path: nupkg

      - name: NuGet login
        id: nuget_login
        uses: NuGet/login@v1
        with:
          user: ${{ vars.NUGET_USER }}

      - name: Publish to NuGet
        run: dotnet nuget push "nupkg/*.nupkg" --source https://api.nuget.org/v3/index.json --skip-duplicate --api-key ${{ steps.nuget_login.outputs.NUGET_API_KEY }}